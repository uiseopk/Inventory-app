<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="재고관리">
<meta name="theme-color" content="#1a1a1a">
<title>정육식당 재고관리</title>
<style>
:root{
  --bg:#f5f4f0;--sf:#fff;--sf2:#f0efe9;
  --b:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.15);
  --t:#1a1a1a;--t2:#6b6b6b;--t3:#9a9a9a;--ac:#1a1a1a;
  --red:#c0392b;--red-bg:#fdf2f2;
  --org:#b7600a;--org-bg:#fef8f0;
  --grn:#1e7e34;--grn-bg:#f0faf2;
  --blu:#1a5c9e;--blu-bg:#f0f6ff;
  --plus:#0a6e3a;--plus-bg:#e8f7ef;
  --minus:#9b1c1c;--minus-bg:#fef2f2;
  --chg:#1a5c9e;--chg-bg:#ebf3ff;
  --r:14px;--rs:8px;--th:64px;--sb:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f0f0f;--sf:#1c1c1e;--sf2:#2c2c2e;
  --b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.15);
  --t:#f2f2f7;--t2:#aeaeb2;--t3:#636366;--ac:#f2f2f7;
  --red:#ff6b6b;--red-bg:#2d1515;
  --org:#ffa726;--org-bg:#2d1f0a;
  --grn:#4caf77;--grn-bg:#0d2418;
  --blu:#5b9bd5;--blu-bg:#0d1f35;
  --plus:#34d399;--plus-bg:#052e1c;
  --minus:#f87171;--minus-bg:#2d0f0f;
  --chg:#5b9bd5;--chg-bg:#0d1f35;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo',BlinkMacSystemFont,sans-serif;color:var(--t);overscroll-behavior:none}
#W{display:flex;flex-direction:column;height:100vh;height:100dvh}
#HD{background:var(--sf);border-bottom:.5px solid var(--b);display:flex;align-items:center;padding:0 16px;padding-top:env(safe-area-inset-top,0);flex-shrink:0;min-height:56px;gap:8px}
#CT{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--th) + var(--sb) + 16px)}
#TB{height:calc(var(--th) + var(--sb));padding-bottom:var(--sb);background:var(--sf);border-top:.5px solid var(--b);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:10}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:9px;font-weight:500;padding:0;position:relative;font-family:inherit}
.tb.on{color:var(--t)}.ti{font-size:20px;line-height:1}
.bd{position:absolute;top:7px;right:calc(50% - 20px);width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--sf)}
#CB{position:fixed;bottom:calc(var(--th) + var(--sb));left:0;right:0;z-index:9;padding:10px 14px;background:var(--chg);display:none;align-items:center;gap:8px}
#CB.on{display:flex}
.cbtn{padding:9px 15px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.c-ok{background:#fff;color:var(--chg)}.c-no{background:rgba(255,255,255,0.2);color:#fff}
.card{background:var(--sf);border-radius:var(--r);border:.5px solid var(--b);overflow:hidden;margin-bottom:12px}
.sec{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 8px 2px}
.row{display:flex;align-items:center;padding:12px 14px;border-bottom:.5px solid var(--b);gap:10px}
.row:last-child{border-bottom:none}
.rp{cursor:pointer;transition:background .12s}.rp:active{background:var(--sf2)}
.mets{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.met{background:var(--sf);border-radius:var(--r);padding:13px 15px;border:.5px solid var(--b)}
.ml{font-size:10px;color:var(--t2);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.mv{font-size:24px;font-weight:700;line-height:1}
.mv.red{color:var(--red)}.mv.org{color:var(--org)}
.irow{display:flex;align-items:center;padding:11px 14px;border-bottom:.5px solid var(--b);gap:9px;transition:background .15s}
.irow:last-child{border-bottom:none}.irow.chg{background:var(--chg-bg)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--grn)}.dot.wr{background:var(--org)}.dot.ng{background:var(--red)}
.ii{flex:1;min-width:0}
.in{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.is{font-size:10px;color:var(--t3);margin-top:2px}
.pg{height:2px;background:var(--b2);border-radius:2px;margin-top:4px;overflow:hidden}
.pf{height:100%;border-radius:2px}
.sp{display:flex;align-items:center;flex-shrink:0}
.sb{width:32px;height:32px;border-radius:50%;border:.5px solid;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;-webkit-user-select:none;user-select:none}
.sb:active{opacity:.6}.sb.m{color:var(--minus);border-color:var(--minus);background:var(--minus-bg)}
.sb.p{color:var(--plus);border-color:var(--plus);background:var(--plus-bg)}
.sv{min-width:46px;text-align:center;font-size:15px;font-weight:700;cursor:pointer;padding:0 3px}
.sv.chg{color:var(--chg)}.sv.lo{color:var(--red)}
.sd{font-size:9px;font-weight:700;text-align:center;height:11px}
.sd.p{color:var(--plus)}.sd.m{color:var(--minus)}
.su{font-size:9px;color:var(--t3);text-align:center}
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.chip.ord{background:var(--red-bg);color:var(--red)}
.chip.mak{background:var(--org-bg);color:var(--org)}
.chip.ok{background:var(--grn-bg);color:var(--grn)}
.al{border-radius:var(--rs);padding:12px 13px;margin-bottom:10px;border:.5px solid}
.al.ng{background:var(--red-bg);border-color:var(--red)}
.al.wr{background:var(--org-bg);border-color:var(--org)}
.al.ok{background:var(--grn-bg);border-color:var(--grn)}
.al.inf{background:var(--blu-bg);border-color:var(--blu)}
.at{font-size:13px;font-weight:600;margin-bottom:3px}
.al.ng .at{color:var(--red)}.al.wr .at{color:var(--org)}.al.ok .at{color:var(--grn)}.al.inf .at{color:var(--blu)}
.ab{font-size:12px;color:var(--t2);line-height:1.5}
.fg{margin-bottom:13px}.fg:last-child{margin-bottom:0}
.fl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block}
.fi{width:100%;background:var(--sf2);border:.5px solid var(--b2);border-radius:var(--rs);padding:10px 12px;font-size:15px;color:var(--t);font-family:inherit;outline:none;appearance:none}
.fi:focus{border-color:var(--t2)}.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.btn{padding:12px 18px;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn:active{opacity:.75}
.bp{background:var(--ac);color:var(--bg);width:100%}
.bs{background:var(--grn);color:#fff;width:100%}
.bd2{background:var(--red-bg);color:var(--red);border:.5px solid var(--red)}
.bi{background:var(--blu-bg);color:var(--blu);border:.5px solid var(--blu);width:100%}
.bg{background:var(--sf2);color:var(--t2);border:.5px solid var(--b2)}
.bsm{padding:7px 13px;font-size:13px;border-radius:7px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.on{opacity:1;pointer-events:all}
.mo{background:var(--sf);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + var(--sb));width:100%;max-height:92vh;overflow-y:auto;transform:translateY(40px);transition:transform .25s}
.ov.on .mo{transform:translateY(0)}
.mh{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 16px}
.mt{font-size:17px;font-weight:700;margin-bottom:16px}
.np{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.nk{padding:13px;border-radius:10px;border:.5px solid var(--b2);background:var(--sf2);font-size:18px;font-weight:500;cursor:pointer;color:var(--t);font-family:inherit}
.nk:active{opacity:.6}
.vl{background:var(--sf);border-radius:var(--r);border:.5px solid var(--b);overflow:hidden}
.vr{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-bottom:.5px solid var(--b);font-size:13px}
.vr:last-child{border-bottom:none}.vr.tot{font-weight:700;font-size:15px;background:var(--sf2)}
.vl2{color:var(--t2)}
.ltb{width:100%;font-size:12px;border-collapse:collapse}
.ltb th{padding:8px;background:var(--sf2);color:var(--t2);font-weight:600;text-align:right;border-bottom:.5px solid var(--b)}
.ltb th:first-child{text-align:left}
.ltb td{padding:9px 8px;border-bottom:.5px solid var(--b);text-align:right;vertical-align:middle}
.ltb td:first-child{text-align:left;font-weight:500}
.ltb tr:last-child td{border-bottom:none}
.ltb .lp{color:var(--plus);font-weight:600}.ltb .lm{color:var(--minus);font-weight:600}
.ltb .lo{color:var(--grn)}.ltb .lr{color:var(--red)}
.stb{display:flex;background:var(--sf2);border-radius:10px;padding:3px;margin-bottom:16px}
.st{flex:1;padding:8px;border-radius:8px;border:none;background:none;font-size:13px;font-weight:600;cursor:pointer;color:var(--t3);font-family:inherit}
.st.on{background:var(--sf);color:var(--t)}
.sp2{width:24px;height:24px;border:2.5px solid var(--b2);border-top-color:var(--t);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.fcard{background:var(--sf);border-radius:var(--r);border:.5px solid var(--b);padding:16px;margin-bottom:12px}
.ir{display:flex;align-items:center;gap:8px;margin-bottom:8px}
</style>
</head>
<body>
<div id="W">
  <div id="HD">
    <div style="flex:1"><div id="HT" style="font-size:17px;font-weight:600">재고 현황</div></div>
    <button class="btn bg bsm" id="HA" style="display:none" onclick="hdrAct()"></button>
  </div>
  <div id="CT"></div>
  <div id="TB">
    <button class="tb on" id="t-inv" onclick="go('inv')"><span class="ti">📦</span>재고현황</button>
    <button class="tb" id="t-recv" onclick="go('recv')"><span class="ti">📥</span>입고</button>
    <button class="tb" id="t-prod" onclick="go('prod')"><span class="ti">🍳</span>생산</button>
    <button class="tb" id="t-ldg" onclick="go('ldg')"><span class="ti">📊</span>수불부</button>
    <button class="tb" id="t-set" onclick="go('set')"><span class="ti">⚙️</span>설정</button>
  </div>
</div>
<div id="CB">
  <div style="flex:1;color:#fff;font-size:13px;font-weight:500">재고 파악 중<span id="CC" style="font-size:11px;opacity:.75;display:block;margin-top:1px"></span></div>
  <button class="cbtn c-no" onclick="cancelP()">취소</button>
  <button class="cbtn c-ok" onclick="commitP()">파악 완료 ✓</button>
</div>

<!-- Direct qty -->
<div class="ov" id="ov-dm">
  <div class="mo">
    <div class="mh"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div><div style="font-size:17px;font-weight:700" id="dm-t"></div><div style="font-size:11px;color:var(--t3);margin-top:3px" id="dm-m"></div></div>
      <button class="btn bd2 bsm" onclick="delFromDM()">삭제</button>
    </div>
    <div style="background:var(--sf2);border-radius:var(--r);padding:14px;margin-bottom:12px;text-align:center">
      <div style="font-size:12px;color:var(--t3);margin-bottom:5px" id="dm-c"></div>
      <div style="font-size:38px;font-weight:700" id="dm-d">0</div>
      <div style="font-size:12px;color:var(--t3);margin-top:3px" id="dm-u"></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px" id="dm-ps"></div>
    <div class="np" id="dm-np"></div>
    <button class="btn bp" onclick="saveDM()" style="margin-bottom:8px">적용</button>
    <button class="btn bg" style="width:100%" onclick="closeOv('ov-dm')">취소</button>
  </div>
</div>

<!-- Receive -->
<div class="ov" id="ov-recv">
  <div class="mo">
    <div class="mh"></div>
    <div class="mt" id="rv-t">입고 등록</div>
    <div id="rv-b"></div>
  </div>
</div>

<!-- Produce -->
<div class="ov" id="ov-prod">
  <div class="mo">
    <div class="mh"></div>
    <div class="mt" id="pd-t">생산 처리</div>
    <div id="pd-b"></div>
  </div>
</div>

<!-- Recipe -->
<div class="ov" id="ov-rec">
  <div class="mo">
    <div class="mh"></div>
    <div class="mt" id="rc-t">레시피</div>
    <div id="rc-b"></div>
  </div>
</div>

<!-- Item edit -->
<div class="ov" id="ov-item">
  <div class="mo">
    <div class="mh"></div>
    <div class="mt">품목 편집</div>
    <div id="it-b"></div>
  </div>
</div>

<script>
'use strict';
var SK='iv4',RK='rv4',PK='pv4',CK='cl4';
var DEF=[
  {id:1,name:'한우 채끝',cat:'육류',type:'식재료',qty:3,min:8,unit:'kg',price:85000},
  {id:2,name:'돼지 삼겹살',cat:'육류',type:'식재료',qty:12,min:15,unit:'kg',price:18000},
  {id:3,name:'돼지 목살',cat:'육류',type:'식재료',qty:9,min:10,unit:'kg',price:16000},
  {id:4,name:'비빔냉면소스',cat:'반제품',type:'반제품',qty:4,min:8,unit:'kg',price:0,recipe:{yields:1,ings:[]}},
  {id:5,name:'갈비 양념',cat:'반제품',type:'반제품',qty:2,min:5,unit:'kg',price:0,recipe:{yields:1,ings:[]}},
  {id:6,name:'쌈채소 모듬',cat:'채소',type:'식재료',qty:1,min:3,unit:'kg',price:6000},
  {id:7,name:'대파',cat:'채소',type:'식재료',qty:5,min:4,unit:'단',price:1500},
  {id:8,name:'마늘',cat:'채소',type:'식재료',qty:2,min:3,unit:'kg',price:8000},
  {id:9,name:'고추장',cat:'공산품',type:'식재료',qty:5,min:3,unit:'kg',price:8000},
  {id:10,name:'참기름',cat:'공산품',type:'식재료',qty:3,min:2,unit:'L',price:20000},
  {id:11,name:'간장',cat:'공산품',type:'식재료',qty:1,min:3,unit:'L',price:6000},
  {id:12,name:'쌈장',cat:'공산품',type:'식재료',qty:1,min:4,unit:'통',price:7000},
];
var items=[],recvs=[],prods=[],closes=[];
var nextId=100,tab='inv',stab='items';
var pend={};
var dmId=null,dmStr='0',dmVal=0;
var rvLines=[],pdId=null,pdStr='1',pdVal=1;
var rcId=null,rcIngs=[];
var eiId=null;
var aiImg=null,aiType='image/jpeg';

function ld(){
  try{
    var s=localStorage.getItem(SK);
    if(s){var p=JSON.parse(s);items=p.items||JSON.parse(JSON.stringify(DEF));nextId=p.nextId||100;}
    else items=JSON.parse(JSON.stringify(DEF));
    recvs=JSON.parse(localStorage.getItem(RK)||'[]');
    prods=JSON.parse(localStorage.getItem(PK)||'[]');
    closes=JSON.parse(localStorage.getItem(CK)||'[]');
  }catch(e){items=JSON.parse(JSON.stringify(DEF));recvs=[];prods=[];closes=[];}
}
function sv(){
  localStorage.setItem(SK,JSON.stringify({items:items,nextId:nextId}));
  localStorage.setItem(RK,JSON.stringify(recvs));
  localStorage.setItem(PK,JSON.stringify(prods));
  localStorage.setItem(CK,JSON.stringify(closes));
}

function fq(n){return n%1===0?String(n):n.toFixed(1);}
function fm(n){return n.toLocaleString('ko-KR')+'원';}
function fd(iso){var d=new Date(iso);return (d.getMonth()+1)+'/'+(d.getDate())+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function td(){return new Date().toISOString().slice(0,10);}
function isDec(u){return ['kg','L','l'].indexOf(u)>=0;}
function pq(item){return pend[item.id]!==undefined?pend[item.id].cur:item.qty;}
function hasPend(){return Object.keys(pend).length>0;}
function st(item,q){if(q===undefined)q=pq(item);var r=q/item.min;if(q<=0)return'ng';if(r<0.5)return'ng';if(r<1)return'wr';return'ok';}
function rcost(item){
  if(!item.recipe||!item.recipe.ings||!item.recipe.ings.length)return 0;
  var c=0;
  item.recipe.ings.forEach(function(ing){var s=items.find(function(i){return i.id===ing.id;});if(s)c+=s.price*ing.amt;});
  return Math.round(c/(item.recipe.yields||1));
}
function ipr(item){return item.type==='반제품'?(rcost(item)||item.price):item.price;}

function go(t){
  tab=t;
  ['inv','recv','prod','ldg','set'].forEach(function(x){document.getElementById('t-'+x).classList.toggle('on',x===t);});
  var titles={inv:'재고 현황',recv:'입고 관리',prod:'생산 관리',ldg:'수불부',set:'설정'};
  document.getElementById('HT').textContent=titles[t];
  var ha=document.getElementById('HA');ha.style.display='none';
  render();
}

function render(){
  updateDots();updateBanner();
  var el=document.getElementById('CT');
  try{
    if(tab==='inv')rInv(el);
    else if(tab==='recv')rRecv(el);
    else if(tab==='prod')rProd(el);
    else if(tab==='ldg')rLdg(el);
    else rSet(el);
  }catch(e){
    el.innerHTML='<div style="padding:20px"><div class="al ng"><div class="at">화면 오류</div><div class="ab">'+e.message+'</div></div><button class="btn bp" onclick="localStorage.clear();location.reload()">초기화 후 재시작</button></div>';
  }
}

function updateDots(){
  var hasBad=items.some(function(i){return pq(i)<i.min;});
  var dot=document.querySelector('#t-inv .bd');
  if(hasBad&&!dot){var d=document.createElement('span');d.className='bd';document.getElementById('t-inv').appendChild(d);}
  else if(!hasBad&&dot){dot.remove();}
}

function updateBanner(){
  var n=Object.keys(pend).length;
  var cb=document.getElementById('CB');
  if(n>0){cb.classList.add('on');document.getElementById('CC').textContent=n+'개 품목 변경됨';}
  else cb.classList.remove('on');
}

// ── INVENTORY ──────────────────────────────────────────
function rInv(el){
  var toMake=items.filter(function(i){return i.type==='반제품'&&pq(i)<i.min;});
  var toOrd=items.filter(function(i){return i.type==='식재료'&&pq(i)<i.min;});
  var tot=items.reduce(function(s,i){return s+pq(i)*ipr(i);},0);
  var h='<div class="mets">'
    +'<div class="met"><div class="ml">전체 품목</div><div class="mv">'+items.length+'<span style="font-size:13px;font-weight:400;color:var(--t3)"> 개</span></div></div>'
    +'<div class="met"><div class="ml">재고 자산</div><div class="mv" style="font-size:20px">'+(tot/10000).toFixed(1)+'<span style="font-size:12px;font-weight:400;color:var(--t3)"> 만원</span></div></div>'
    +'<div class="met"><div class="ml">발주 필요</div><div class="mv red">'+toOrd.length+'<span style="font-size:13px;font-weight:400;color:var(--t3)"> 개</span></div></div>'
    +'<div class="met"><div class="ml">생산 필요</div><div class="mv org">'+toMake.length+'<span style="font-size:13px;font-weight:400;color:var(--t3)"> 개</span></div></div>'
    +'</div>';
  var cats=[];
  items.forEach(function(i){if(cats.indexOf(i.cat)<0)cats.push(i.cat);});
  cats.forEach(function(cat){
    h+='<div class="sec">'+cat+'</div><div class="card">';
    items.filter(function(i){return i.cat===cat;}).forEach(function(item){
      var q=pq(item),pp=pend[item.id];
      var d=pp?Math.round((pp.cur-pp.bef)*10)/10:0;
      var s=st(item,q),ratio=Math.min(q/item.min,1);
      var fc=s==='ok'?'var(--grn)':s==='wr'?'var(--org)':'var(--red)';
      var chip=item.type==='반제품'&&q<item.min?'<span class="chip mak">생산필요</span>':item.type==='식재료'&&q<item.min?'<span class="chip ord">발주필요</span>':'<span class="chip ok">정상</span>';
      var dc=d>0?'p':d<0?'m':'',ds=d>0?'+'+fq(d):d<0?fq(d):'';
      var vc=pp?'sv chg':q<item.min?'sv lo':'sv';
      var cost=item.type==='반제품'&&rcost(item)>0?'&nbsp;·&nbsp;원가 '+fm(rcost(item)):'';
      h+='<div class="irow'+(pp?' chg':'')+'" id="ir-'+item.id+'">'
        +'<div class="dot '+s+'"></div>'
        +'<div class="ii">'
          +'<div class="in">'+item.name+'</div>'
          +'<div class="is">'+chip+'&nbsp;기준 '+item.min+item.unit+cost+'</div>'
          +'<div class="pg"><div class="pf" style="width:'+(ratio*100).toFixed(0)+'%;background:'+fc+'"></div></div>'
        +'</div>'
        +'<div class="sp">'
          +'<button class="sb m" onclick="adj('+item.id+',-1)">−</button>'
          +'<div style="display:flex;flex-direction:column;align-items:center">'
            +'<div class="'+vc+'" onclick="openDM('+item.id+')">'+fq(q)+'</div>'
            +'<div class="su">'+item.unit+'</div>'
            +'<div class="sd '+dc+'">'+ds+'</div>'
          +'</div>'
          +'<button class="sb p" onclick="adj('+item.id+',1)">+</button>'
        +'</div>'
        +'</div>';
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

function adj(id,dir){
  var item=items.find(function(i){return i.id===id;});if(!item)return;
  var step=isDec(item.unit)?0.5:1;
  var bef=pend[id]?pend[id].bef:item.qty;
  var cur=pend[id]?pend[id].cur:item.qty;
  var nxt=Math.max(0,Math.round((cur+dir*step)*10)/10);
  if(nxt===bef)delete pend[id];else pend[id]={bef:bef,cur:nxt};
  updRow(item);updateBanner();updateDots();
}

function updRow(item){
  var row=document.getElementById('ir-'+item.id);if(!row)return;
  var q=pq(item),pp=pend[item.id];
  var d=pp?Math.round((pp.cur-pp.bef)*10)/10:0;
  var s=st(item,q),ratio=Math.min(q/item.min,1);
  var fc=s==='ok'?'var(--grn)':s==='wr'?'var(--org)':'var(--red)';
  var chip=item.type==='반제품'&&q<item.min?'<span class="chip mak">생산필요</span>':item.type==='식재료'&&q<item.min?'<span class="chip ord">발주필요</span>':'<span class="chip ok">정상</span>';
  row.className='irow'+(pp?' chg':'');
  row.querySelector('.dot').className='dot '+s;
  row.querySelector('.is').innerHTML=chip+'&nbsp;기준 '+item.min+item.unit;
  row.querySelector('.pf').style.width=(ratio*100).toFixed(0)+'%';
  row.querySelector('.pf').style.background=fc;
  var sv=row.querySelector('[class^="sv"],.sv');
  if(!sv){sv=row.querySelectorAll('div')[3];}
  var vc=pp?'sv chg':q<item.min?'sv lo':'sv';
  sv.className=vc;sv.textContent=fq(q);
  var sd=row.querySelector('.sd');
  if(sd){sd.textContent=d>0?'+'+fq(d):d<0?fq(d):'';sd.className='sd '+(d>0?'p':d<0?'m':'');}
}

function commitP(){
  var changed=Object.entries(pend).filter(function(e){return e[1].cur!==e[1].bef;});
  if(!changed.length){pend={};updateBanner();return;}
  changed.forEach(function(e){var i=items.find(function(x){return x.id===parseInt(e[0]);});if(i)i.qty=e[1].cur;});
  closes.unshift({id:Date.now(),time:new Date().toISOString(),
    changes:changed.map(function(e){var i=items.find(function(x){return x.id===parseInt(e[0]);});return{itemId:parseInt(e[0]),name:i?i.name:'?',unit:i?i.unit:'',bef:e[1].bef,aft:e[1].cur,d:Math.round((e[1].cur-e[1].bef)*10)/10};})
  });
  if(closes.length>90)closes=closes.slice(0,90);
  pend={};sv();render();
  var cb=document.getElementById('CB');
  cb.style.background='var(--grn)';
  cb.innerHTML='<div style="flex:1;color:#fff;font-size:14px;font-weight:600;text-align:center">✓ 재고 파악 완료</div>';
  cb.classList.add('on');
  setTimeout(function(){cb.classList.remove('on');cb.style.background='var(--chg)';updateBanner();},1600);
}
function cancelP(){if(!hasPend())return;if(!confirm('변경 사항을 취소할까요?'))return;pend={};render();}

function rvLC(idx,field,val){rvLines[idx][field]=val;if(field==='id'){var item=items.find(function(i){return i.id===parseInt(val);});if(item)rvLines[idx].up=item.price;}drawRvModal();}

function saveRv(){

function openRvAI(){
  document.getElementById('rv-t').textContent='전표 촬영';

    '<div style="text-align:center;padding:10px 0 20px">'

      +'<div class="btn bi">📷 카메라로 촬영</div>'

    +'</label>'

function handleAI(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  aiType=file.type||'image/jpeg';
  var reader=new FileReader();
  reader.onload=function(e){
    aiImg=e.target.result.split(',')[1];
    document.getElementById('rv-b').innerHTML=
      '<div style="width:100%;border-radius:14px;overflow:hidden;margin-bottom:14px;background:var(--sf2)">'
      +'<img src="'+e.target.result+'" style="width:100%;display:block">'
      +'</div>'
      +'<div style="text-align:center;padding:16px 0"><div class="sp2"></div>'
      +'<div style="font-size:13px;color:var(--t2);margin-top:12px">전표를 분석하고 있어요...</div></div>';
    doAI();
  };
  reader.readAsDataURL(file);
}

function doAI(){
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:aiType,data:aiImg}},
        {type:'text',text:'이 납품 전표/영수증에서 품목 정보를 추출하세요. JSON만 응답하세요:\n{"items":[{"name":"품목명","qty":수량,"unit":"단위","unitPrice":단가}]}\n단가는 1단위 기준. 단위는 kg,L,개,봉,박스 등.'}
      ]}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var text=(data.content||[]).filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join('');
    var parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    showAIReview(parsed.items||[]);
  })
  .catch(function(){
    document.getElementById('rv-b').innerHTML=
      '<div class="al ng"><div class="at">인식 실패</div><div class="ab">전표를 다시 선명하게 촬영해주세요.</div></div>'
      +'<button class="btn bi" onclick="openRvAI()" style="margin-bottom:8px">다시 시도</button>'
      +'<button class="btn bg" style="width:100%;margin-top:8px" onclick="openRvManual()">수동 입력으로 전환</button>';
  });
}

function showAIReview(aiItems){
  var opts=items.filter(function(i){return i.type==='식재료';}).map(function(i){return '<option value="'+i.id+'">'+i.name+' ('+i.unit+')</option>';}).join('');
  var h='<div class="al inf"><div class="at">분석 완료 · '+aiItems.length+'개 품목 인식</div><div class="ab">품목을 확인하고 수정해주세요.</div></div>'
    +'<div class="fg"><label class="fl">메모</label><input class="fi" id="rv-note" placeholder="납품업체명 등"></div>';
  aiItems.forEach(function(ai,idx){
    var found=items.find(function(i){return i.type==='식재료'&&(i.name.indexOf(ai.name)>=0||ai.name.indexOf(i.name)>=0);});
    h+='<div class="fcard">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--blu)">"'+ai.name+'" '+fq(ai.qty)+(ai.unit||'')+' · '+fm(ai.unitPrice||0)+'/'+(ai.unit||'')+'</div>'
      +'<div class="fg"><label class="fl">매칭 품목</label><select class="fi" id="ai-m-'+idx+'"><option value="">-- 건너뛰기 --</option>'+opts+'</select></div>'
      +'<div class="g2">'
        +'<div class="fg"><label class="fl">수량</label><input class="fi" type="number" id="ai-q-'+idx+'" value="'+(ai.qty||0)+'" inputmode="decimal"></div>'
        +'<div class="fg"><label class="fl">단가</label><input class="fi" type="number" id="ai-p-'+idx+'" value="'+(ai.unitPrice||0)+'" inputmode="numeric"></div>'
      +'</div>'
      +'</div>';
  });
  h+='<button class="btn bs" onclick="saveAI('+aiItems.length+')" style="margin-bottom:8px">입고 처리 완료</button>'
    +'<button class="btn bg" style="width:100%;margin-top:0" onclick="closeOv(\'ov-recv\')">취소</button>';
  document.getElementById('rv-b').innerHTML=h;
  aiItems.forEach(function(ai,idx){
    var found=items.find(function(i){return i.type==='식재료'&&(i.name.indexOf(ai.name)>=0||ai.name.indexOf(i.name)>=0);});
    if(found){var sel=document.getElementById('ai-m-'+idx);if(sel)sel.value=found.id;}
  });
}

function saveAI(cnt){
  var lines=[];
  for(var i=0;i<cnt;i++){
    var mid=parseInt((document.getElementById('ai-m-'+i)||{}).value||'0');
    var qty=parseFloat((document.getElementById('ai-q-'+i)||{}).value||'0');
    var up=parseFloat((document.getElementById('ai-p-'+i)||{}).value||'0');
    if(mid&&qty>0)lines.push({id:mid,qty:qty,up:up});
  }
  if(!lines.length){alert('매칭된 품목이 없습니다.');return;}
  lines.forEach(function(l){var item=items.find(function(i){return i.id===l.id;});if(item){item.qty=Math.round((item.qty+l.qty)*10)/10;item.price=l.up;}});
  var note=(document.getElementById('rv-note')||{}).value||'전표 자동 인식';
  recvs.unshift({id:Date.now(),time:new Date().toISOString(),note:note,lines:lines});
  if(recvs.length>200)recvs=recvs.slice(0,200);
  sv();closeOv('ov-recv');render();
}

function drawProdModal(){
  var item=items.find(function(i){return i.id===pdId;});if(!item)return;
  var hasR=item.recipe&&item.recipe.ings&&item.recipe.ings.length>0;
  var h='<div style="background:var(--sf2);border-radius:var(--r);padding:14px;margin-bottom:14px;text-align:center">'
    +'<div style="font-size:12px;color:var(--t3);margin-bottom:4px">생산량 입력 ('+item.unit+')</div>'
    +'<div style="font-size:38px;font-weight:700">'+fq(pdVal)+'</div>'
    +'<div style="font-size:12px;color:var(--t3);margin-top:3px">현재 '+fq(item.qty)+item.unit+' → 생산 후 '+fq(Math.round((item.qty+pdVal)*10)/10)+item.unit+'</div>'
    +'</div>';
  var keys=['1','2','3','4','5','6','7','8','9','←','0','.'];
  h+='<div class="np">'+keys.map(function(k){return '<button class="nk" onclick="pdKey(\''+k+'\')">'+k+'</button>';}).join('')+'</div>';
  if(hasR){
    h+='<div class="sec">소비될 재료 ('+fq(pdVal)+item.unit+' 생산 기준)</div><div class="vl" style="margin-bottom:14px">';
    var canP=true;
    item.recipe.ings.forEach(function(ing){
      var src=items.find(function(i){return i.id===ing.id;});if(!src)return;
      var needed=Math.round((ing.amt/(item.recipe.yields||1))*pdVal*100)/100;
      var ok=src.qty>=needed;if(!ok)canP=false;
      h+='<div class="vr"><span class="vl2">'+src.name+'</span>'
        +'<span style="color:'+(ok?'var(--t)':'var(--red)')+'">'+fq(needed)+src.unit+(ok?'':' (부족: '+fq(src.qty)+')')+'</span></div>';
    });
    h+='</div>';
    if(!canP)h+='<div class="al wr"><div class="at">재료 부족</div><div class="ab">일부 재료가 부족합니다. 그래도 진행할 수 있습니다.</div></div>';
  }else{
    h+='<div class="al wr"><div class="at">레시피 미등록</div><div class="ab">설정 → 레시피에서 등록하면 재료가 자동 차감됩니다.</div></div>';
  }
  h+='<button class="btn bs" onclick="saveProd()" style="margin-bottom:8px">생산 처리</button>'
    +'<button class="btn bg" style="width:100%" onclick="closeOv(\'ov-prod\')">취소</button>';
  document.getElementById('pd-b').innerHTML=h;
}

function pdKey(k){
  if(k==='←')pdStr=pdStr.length>1?pdStr.slice(0,-1):'0';
  else if(k==='.'){if(pdStr.indexOf('.')<0)pdStr+=k;}
  else{if(pdStr==='0')pdStr=k;else pdStr+=k;}
  pdVal=Math.max(0,parseFloat(pdStr)||0);drawProdModal();
}

function saveProd(){
  var item=items.find(function(i){return i.id===pdId;});
  if(!item||pdVal<=0){alert('생산량을 입력하세요.');return;}
  var inputs=[];
  if(item.recipe&&item.recipe.ings){
    item.recipe.ings.forEach(function(ing){
      var src=items.find(function(i){return i.id===ing.id;});if(!src)return;
      var needed=Math.round((ing.amt/(item.recipe.yields||1))*pdVal*100)/100;
      src.qty=Math.max(0,Math.round((src.qty-needed)*100)/100);
      inputs.push({id:src.id,qty:needed});
    });
  }
  item.qty=Math.round((item.qty+pdVal)*10)/10;
  prods.unshift({id:Date.now(),time:new Date().toISOString(),outId:item.id,outQty:pdVal,inputs:inputs});
  if(prods.length>200)prods=prods.slice(0,200);
  sv();closeOv('ov-prod');render();
}

// ── LEDGER ──────────────────────────────────────────
function rLdg(el){
  function dk(d){return d.toISOString().slice(0,10);}
  var todays=td();
  var allDates={};allDates[todays]=1;
  closes.forEach(function(c){allDates[dk(new Date(c.time))]=1;});
  recvs.forEach(function(r){allDates[dk(new Date(r.time))]=1;});
  prods.forEach(function(p){allDates[dk(new Date(p.time))]=1;});
  var dates=Object.keys(allDates).sort().reverse().slice(0,14);
  var h='<div class="al inf"><div class="at">수불부</div><div class="ab">전일재고 + 입고 + 생산 − 사용 = 마감재고<br>사용량 = (전일재고+입고+생산) − 실재고</div></div>';
  var hasData=false;
  dates.forEach(function(ds){
    var d=new Date(ds);
    var isT=ds===todays;
    var label=isT?'오늘':(d.getMonth()+1)+'월'+(d.getDate())+'일';
    var dayC=closes.filter(function(c){return dk(new Date(c.time))===ds;});
    var dayR=recvs.filter(function(r){return dk(new Date(r.time))===ds;});
    var dayP=prods.filter(function(p){return dk(new Date(p.time))===ds;});
    if(!dayC.length&&!dayR.length&&!dayP.length)return;
    hasData=true;
    var sm={};
    function add(id,f,v){if(!sm[id])sm[id]={recv:0,prod:0,pused:0,bef:null,aft:null};sm[id][f]=(sm[id][f]||0)+v;}
    dayR.forEach(function(r){r.lines.forEach(function(l){add(l.id,'recv',l.qty);});});
    dayP.forEach(function(p){add(p.outId,'prod',p.outQty);if(p.inputs)p.inputs.forEach(function(inp){add(inp.id,'pused',inp.qty);});});
    dayC.forEach(function(s){s.changes.forEach(function(c){if(!sm[c.itemId])sm[c.itemId]={recv:0,prod:0,pused:0};sm[c.itemId].bef=c.bef;sm[c.itemId].aft=c.aft;});});
    var ids=Object.keys(sm);if(!ids.length)return;
    h+='<div class="sec">'+label+(dayC.length?' · 마감완료':isT?' · 마감전':'')+'</div>';
    h+='<div class="card" style="overflow-x:auto"><table class="ltb"><thead><tr><th>품목</th><th>입고</th><th>생산</th><th>사용</th><th>마감재고</th></tr></thead><tbody>';
    ids.forEach(function(id){
      var item=items.find(function(i){return i.id===parseInt(id);});
      var s=sm[id],u=item?item.unit:'';
      var cStr=s.aft!=null?fq(s.aft)+u:'미마감';
      var uStr='-';
      if(s.aft!=null&&s.bef!=null){
        var uv=Math.round((s.bef+s.recv+s.prod-s.pused-s.aft)*10)/10;
        uStr='<span class="'+(uv>0?'lm':'lo')+'">'+(uv>0?'-'+fq(uv):fq(uv))+u+'</span>';
      }
      h+='<tr>'
        +'<td>'+(item?item.name:'?')+'</td>'
        +'<td class="'+(s.recv>0?'lp':'')+'">'+(s.recv>0?'+'+fq(s.recv)+u:'-')+'</td>'
        +'<td class="'+(s.prod>0?'lp':'')+'">'+(s.prod>0?'+'+fq(s.prod)+u:'-')+'</td>'
        +'<td>'+uStr+'</td>'
        +'<td>'+cStr+'</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
  });
  if(!hasData)h+='<div style="text-align:center;padding:50px 20px;color:var(--t3)"><div style="font-size:36px;margin-bottom:10px">📊</div><div>기록이 쌓이면 수불부가 표시됩니다</div></div>';
  el.innerHTML=h;
}

// ── SETTINGS ─────────────────────────────────────────
function rSet(el){
  var ha=document.getElementById('HA');ha.style.display='block';ha.textContent='+ 품목 추가';
  var h='<div class="stb">'
    +'<button class="st '+(stab==='items'?'on':'')+'" onclick="stab=\'items\';render()">품목 관리</button>'
    +'<button class="st '+(stab==='rec'?'on':'')+'" onclick="stab=\'rec\';render()">레시피</button>'
    +'</div>';
  if(stab==='items'){
    h+='<div class="card">';
    items.forEach(function(item){
      var cost=item.type==='반제품'?rcost(item):0;
      h+='<div class="row rp" onclick="openEI('+item.id+')">'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:500">'+item.name+'</div>'
        +'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+item.cat+' · '+item.type+' · '+item.unit+' · '+(item.type==='반제품'?'원가 '+(cost>0?fm(cost):'미등록'):fm(item.price))+'</div></div>'
        +'<div style="font-size:12px;color:var(--t3)">편집 →</div></div>';
    });
    h+='</div>';
  }else{
    var semi=items.filter(function(i){return i.type==='반제품';});
    if(!semi.length){h+='<div style="text-align:center;padding:40px;color:var(--t3)">품목 관리에서 반제품을 먼저 추가하세요</div>';el.innerHTML=h;return;}
    h+='<div class="al inf"><div class="at">레시피 등록</div><div class="ab">반제품 1단위를 만드는 데 필요한 재료와 양을 입력하세요.</div></div>';
    h+='<div class="card">';
    semi.forEach(function(item){
      var hasR=item.recipe&&item.recipe.ings&&item.recipe.ings.length>0;
      var cost=rcost(item);
      h+='<div class="row rp" onclick="openRC('+item.id+')">'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:500">'+item.name+'</div>'
        +'<div style="font-size:11px;color:var(--t3);margin-top:2px">'
          +(hasR?'재료 '+item.recipe.ings.length+'개 · 원가 '+fm(cost)+'/'+item.unit:'<span style="color:var(--org)">레시피 미등록</span>')
        +'</div></div><div style="font-size:12px;color:var(--t3)">편집 →</div></div>';
    });
    h+='</div>';
  }
  el.innerHTML=h;
}
function hdrAct(){if(tab==='set'&&stab==='items')openEI(null);}

// ── ITEM EDIT ────────────────────────────────────────
function openEI(id){
  eiId=id;
  document.getElementById('it-b').innerHTML=drawEI(id?items.find(function(i){return i.id===id;}):null);
  openOv('ov-item');
}
function drawEI(item){
  function sel(v,opt){return v===opt?' selected':'';}
  return '<div class="fg"><label class="fl">품목명</label><input class="fi" id="if-n" value="'+(item?item.name:'')+'"></div>'
    +'<div class="g2">'
      +'<div class="fg"><label class="fl">카테고리</label><select class="fi" id="if-c">'
        +'<option'+sel(item&&item.cat,'육류')+'>육류</option>'
        +'<option'+sel(item&&item.cat,'채소')+'>채소</option>'
        +'<option'+sel(item&&item.cat,'공산품')+'>공산품</option>'
        +'<option'+sel(item&&item.cat,'소스류')+'>소스류</option>'
        +'<option'+sel(item&&item.cat,'반제품')+'>반제품</option>'
        +'<option'+sel(item&&item.cat,'기타')+'>기타</option>'
      +'</select></div>'
      +'<div class="fg"><label class="fl">구분</label><select class="fi" id="if-tp">'
        +'<option value="식재료"'+sel(item&&item.type,'식재료')+'>식재료</option>'
        +'<option value="반제품"'+sel(item&&item.type,'반제품')+'>반제품</option>'
      +'</select></div>'
    +'</div>'
    +'<div class="g3">'
      +'<div class="fg"><label class="fl">현재고</label><input class="fi" type="number" id="if-q" value="'+(item?item.qty:0)+'" min="0" step="0.1" inputmode="decimal"></div>'
      +'<div class="fg"><label class="fl">기준치</label><input class="fi" type="number" id="if-mn" value="'+(item?item.min:0)+'" min="0" step="0.1" inputmode="decimal"></div>'
      +'<div class="fg"><label class="fl">단위</label><input class="fi" id="if-u" value="'+(item?item.unit:'kg')+'"></div>'
    +'</div>'
    +'<div class="fg"><label class="fl">단가 (원)</label><input class="fi" type="number" id="if-p" value="'+(item?item.price:0)+'" min="0" inputmode="numeric"></div>'
    +'<button class="btn bp" onclick="saveEI()" style="margin-bottom:8px">'+(eiId?'저장':'추가')+'</button>'
    +(eiId?'<button class="btn bd2" style="width:100%;margin-bottom:8px" onclick="delEI()">삭제</button>':'')
    +'<button class="btn bg" style="width:100%" onclick="closeOv(\'ov-item\')">취소</button>';
}
function saveEI(){
  var name=(document.getElementById('if-n')||{}).value.trim();
  if(!name){alert('품목명을 입력하세요.');return;}
  var type=(document.getElementById('if-tp')||{}).value;
  var data={name:name,cat:(document.getElementById('if-c')||{}).value,type:type,
    qty:parseFloat((document.getElementById('if-q')||{}).value)||0,
    min:parseFloat((document.getElementById('if-mn')||{}).value)||0,
    unit:(document.getElementById('if-u')||{}).value||'kg',
    price:parseInt((document.getElementById('if-p')||{}).value)||0};
  if(eiId){var item=items.find(function(i){return i.id===eiId;});Object.assign(item,data);if(type==='반제품'&&!item.recipe)item.recipe={yields:1,ings:[]};}
  else{data.id=nextId++;if(type==='반제품')data.recipe={yields:1,ings:[]};items.push(data);}
  sv();closeOv('ov-item');render();
}
function delEI(){if(!confirm('삭제할까요?'))return;items=items.filter(function(i){return i.id!==eiId;});sv();closeOv('ov-item');render();}

// ── RECIPE ──────────────────────────────────────────
function openRC(id){
  rcId=id;var item=items.find(function(i){return i.id===id;});
  rcIngs=JSON.parse(JSON.stringify(item.recipe?item.recipe.ings||[]:[]))
    .map(function(ing){return{id:ing.id,amt:ing.amt};});
  document.getElementById('rc-t').textContent=item.name+' 레시피';
  drawRC();openOv('ov-rec');
}
function drawRC(){
  var item=items.find(function(i){return i.id===rcId;});if(!item)return;
  var yields=item.recipe?item.recipe.yields||1:1;
  var opts=items.filter(function(i){return i.type==='식재료';}).map(function(i){return '<option value="'+i.id+'">'+i.name+' ('+i.unit+')</option>';}).join('');
  var h='<div class="al inf"><div class="ab">'+item.name+' '+fq(yields)+item.unit+' 생산에 필요한 재료</div></div>'
    +'<div class="fg"><label class="fl">기준 생산량</label><input class="fi" type="number" id="rc-y" value="'+yields+'" step="0.1" min="0.1" inputmode="decimal"></div>'
    +'<div class="sec">재료 목록</div>';
  rcIngs.forEach(function(ing,idx){
    var src=items.find(function(i){return i.id===ing.id;});
    h+='<div class="ir">'
      +'<select class="fi" style="flex:2" onchange="rcIC('+idx+',\'id\',+this.value)"><option value="0">-- 선택 --</option>'+opts+'</select>'
      +'<input class="fi" style="flex:1;width:0" type="number" min="0" step="0.01" inputmode="decimal" placeholder="'+(src?src.unit:'양')+'" value="'+(ing.amt||'')+'" oninput="rcIC('+idx+',\'amt\',+this.value)">'
      +'<button style="width:28px;height:40px;border:none;background:none;color:var(--red);font-size:18px;cursor:pointer;flex-shrink:0" onclick="rcIR('+idx+')">×</button>'
      +'</div>';
  });
  var tot=rcIngs.reduce(function(s,ing){var src=items.find(function(i){return i.id===ing.id;});return s+(src?src.price*ing.amt:0);},0);
  if(tot>0)h+='<div style="font-size:12px;color:var(--t2);margin:4px 0 10px">기준량 원가: '+fm(Math.round(tot))+' → '+item.unit+'당 '+fm(Math.round(tot/yields))+'</div>';
  h+='<button class="btn bg" onclick="rcIA()" style="width:100%;margin-bottom:14px">+ 재료 추가</button>'
    +'<button class="btn bp" onclick="saveRC()" style="margin-bottom:8px">저장</button>'
    +'<button class="btn bg" style="width:100%" onclick="closeOv(\'ov-rec\')">취소</button>';
  document.getElementById('rc-b').innerHTML=h;
  rcIngs.forEach(function(ing,idx){
    var sels=document.querySelectorAll('#rc-b select');
    if(sels[idx]&&ing.id)sels[idx].value=ing.id;
  });
}
function rcIC(idx,f,v){rcIngs[idx][f]=v;drawRC();}
function rcIA(){rcIngs.push({id:0,amt:0});drawRC();}
function rcIR(idx){rcIngs.splice(idx,1);drawRC();}
function saveRC(){
  var item=items.find(function(i){return i.id===rcId;});
  var y=parseFloat((document.getElementById('rc-y')||{}).value)||1;
  if(!item.recipe)item.recipe={};
  item.recipe.yields=y;
  item.recipe.ings=rcIngs.filter(function(i){return i.id&&i.amt>0;});
  sv();closeOv('ov-rec');render();
}

// ── DIRECT QTY ──────────────────────────────────────
function openDM(id){
  var item=items.find(function(i){return i.id===id;});if(!item)return;
  dmId=id;dmVal=pq(item);dmStr=String(dmVal);
  document.getElementById('dm-t').textContent=item.name;
  document.getElementById('dm-m').textContent='기준치 '+item.min+item.unit+' · '+item.type;
  document.getElementById('dm-c').textContent='저장된 재고 '+fq(item.qty)+item.unit;
  document.getElementById('dm-u').textContent=item.unit;
  updDM();
  var presets=[0,Math.round(item.min*0.5*10)/10,item.min,Math.round(item.min*1.5*10)/10,item.min*2];
  presets=presets.filter(function(v,i,a){return a.indexOf(v)===i&&v>=0;});
  if(presets.indexOf(dmVal)<0)presets.push(dmVal);
  presets.sort(function(a,b){return a-b;});
  document.getElementById('dm-ps').innerHTML=presets.slice(0,8).map(function(v){
    return '<button onclick="dmP('+v+')" style="padding:10px 4px;border-radius:9px;border:.5px solid var(--b2);background:'+(v===dmVal?'var(--ac)':'var(--sf2)')+';color:'+(v===dmVal?'var(--bg)':'var(--t)')+';font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">'+v+'</button>';
  }).join('');
  var keys=['1','2','3','4','5','6','7','8','9','←','0','.'];
  document.getElementById('dm-np').innerHTML=keys.map(function(k){return '<button class="nk" onclick="dmK(\''+k+'\')">'+k+'</button>';}).join('');
  openOv('ov-dm');
}
function dmP(v){dmVal=v;dmStr=String(v);updDM();}
function dmK(k){
  if(k==='←')dmStr=dmStr.length>1?dmStr.slice(0,-1):'0';
  else if(k==='.'){if(dmStr.indexOf('.')<0)dmStr+=k;}
  else{if(dmStr==='0')dmStr=k;else dmStr+=k;}
  dmVal=parseFloat(dmStr)||0;updDM();
}
function updDM(){
  document.getElementById('dm-d').textContent=fq(dmVal);
  document.querySelectorAll('#dm-ps button').forEach(function(b){
    var v=parseFloat(b.textContent);
    b.style.background=v===dmVal?'var(--ac)':'var(--sf2)';
    b.style.color=v===dmVal?'var(--bg)':'var(--t)';
  });
}
function saveDM(){
  var item=items.find(function(i){return i.id===dmId;});if(!item)return;
  var bef=pend[dmId]?pend[dmId].bef:item.qty;
  if(dmVal===bef)delete pend[dmId];else pend[dmId]={bef:bef,cur:dmVal};
  closeOv('ov-dm');if(tab==='inv'){updRow(item);updateBanner();}
}
function delFromDM(){if(!confirm('삭제할까요?'))return;items=items.filter(function(i){return i.id!==dmId;});delete pend[dmId];sv();closeOv('ov-dm');render();}

// ── OVERLAY ─────────────────────────────────────────
function openOv(id){document.getElementById(id).classList.add('on');}
function closeOv(id){document.getElementById(id).classList.remove('on');}
['ov-dm','ov-recv','ov-prod','ov-rec','ov-item'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeOv(id);});
});

window.onerror=function(msg,src,line){
  var el=document.getElementById('CT');
  if(el)el.innerHTML='<div style="padding:20px"><div class="al ng"><div class="at">오류 발생</div><div class="ab">'+msg+' ('+line+'줄)</div></div>'
    +'<button class="btn bp" style="margin-bottom:8px" onclick="location.reload()">새로고침</button>'
    +'<button class="btn bg" style="width:100%" onclick="localStorage.clear();location.reload()">초기화 후 재시작</button></div>';
  return true;
};

ld();render();
</script>
